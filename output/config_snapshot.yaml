_test_cells:
- HMEC
- NHEK
_train_cells:
- GM12878
- HeLa
- K562
- IMR90
augmentation:
  enabled: true
  epi_noise_std: 0.05
  rc_prob: 0.5
  shift_max_bins: 3
data:
  batch_size: 64
  bin_size: 500
  encoder_fit_samples: 5000
  enhancer_window: 3000
  epigenetic_bins: 5000
  feats_order:
  - CTCF
  - DNase
  - H3K27ac
  - H3K27me3
  - H3K36me3
  - H3K4me1
  - H3K4me3
  - H3K9me3
  kmer_size: 3
  n_epigenetic_features: 9
  promoter_window: 3000
  seq_len_bp: 2500000
  sequence_length: 6000
experiment_name: POCD_Kansformer_v6
model:
  att_penalty: 0.1
  dropout: 0.1
  head_dropout: 0.2
  hidden_dim: 180
  kan_hidden: 64
  n_tokens: 128
  num_heads: 6
  num_layers: 3
  sa_da: 64
  sa_r: 32
paths:
  bengi_dir: ./data/BENGI
  feats_config: ./data/genomic_data/CTCF_DNase_6histone_local.500.json
  ref_genome: ./data/hg19.fa
  save_dir: ./output
training:
  att_penalty_coeff: 0.1
  epochs: 100
  grad_clip: 1.0
  lambda_dist: 1.0
  lr: 0.0001
  num_workers: 0
  patience: 15
  use_cosine_scheduler: false
  valid_chroms:
  - chr11
  - chr17
  weight_decay: 0
